<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<section id="start">

    <h1>🎀 Happy Birthday 🎀</h1>

<p class="sub">
    <span id="birthdayName"></span>ちゃんへ
</p>

<div class="envelope" onclick="openLetter()">✉️
    <p class="envelope-title">タップして開く</p>
</div>

<p>by くーとより</p>
</section>

<div id="countdown">3</div>

<section id="main">
<h1>🎂 Happy Birthday 🎂</h1>

<div class="card reveal">
<h2>さらちゃんへ</h2>
<p>お誕生日おめでとう！✨<br><br>素敵な一年になりますように！</p>
</div>

<div class="card reveal">
<h2>メッセージ</h2>
<p>いつもありがとう😊<br>インターハイ頑張ってね！<br>応援してます！<br><br>引退したら会ってみたいね？ｗ<br>さらはどう思う？笑<br>こんなことしかできなくてごめんね～</p>
</div>



<button id="secretBtn">🎁 Secret Message</button>
<div id="secretMessage">さらはかわいいよ！<br>自信をもってください💖</div>

<div class="footer">✨ Have a Wonderful Birthday ✨</div>
</section>

<script src="script.js"></script>
</body>
</html>
